apiVersion: v1
kind: Pod
metadata:
  labels:
    jenkins: cicd-kubernetes-agent
spec:
  serviceAccountName: jenkins
  containers:
    - name: node
      image: node:20-alpine
      command:
        - cat
      tty: true

    - name: docker
      image: docker:25-cli
      command:
        - cat
      tty: true
      volumeMounts:
        - name: docker-sock
          mountPath: /var/run/docker.sock

    - name: kubectl
      image: alpine/k8s:1.31.0
      command:
        - cat
      tty: true

  volumes:
    - name: docker-sock
      hostPath:
        path: /var/run/docker.sock